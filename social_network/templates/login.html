<!-- templates/login.html -->
{% extends 'base.html' %}

{% block title %}Вход - Social Network{% endblock %}

{% block content %}
<h1>🔐 Вход</h1>

<div id="message" class="message hidden"></div>

<form id="loginForm">
    <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" required>
    </div>
    
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required>
    </div>
    
    <button type="submit">Войти</button>
</form>

<div class="link">
    Нет аккаунта? <a href="/register/">Зарегистрироваться</a>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await apiRequest(`${API_BASE}/users/login/`, 'POST', {
                username,
                password
            });
            
            showMessage('message', 'Успешный вход! Перенаправление...', 'success');
            
            setTimeout(() => {
                window.location.href = '/dashboard/';
            }, 1000);
            
        } catch (error) {
            showMessage('message', error.message || 'Ошибка входа', 'error');
        }
    });
</script>
{% endblock %}

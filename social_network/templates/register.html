<!-- templates/register.html -->
{% extends 'base.html' %}

{% block title %}Регистрация - Social Network{% endblock %}

{% block content %}
<h1>📝 Регистрация</h1>

<div id="message" class="message hidden"></div>

<form id="registerForm">
    <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" required>
    </div>
    
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>
    
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required minlength="6">
    </div>
    
    <div class="form-group">
        <label for="password_confirm">Подтвердите пароль</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="6">
    </div>
    
    <button type="submit">Зарегистрироваться</button>
</form>

<div class="link">
    Уже есть аккаунт? <a href="/login/">Войти</a>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            password_confirm: document.getElementById('password_confirm').value
        };

        try {
            const response = await apiRequest(`${API_BASE}/users/register/`, 'POST', formData);

            showMessage('message', 'Регистрация успешна! Перенаправление...', 'success');

            setTimeout(() => {
                window.location.href = '/dashboard/';
            }, 1000);

        } catch (error) {
            let errorMessage = error.message;
            if (error.message.includes('password_confirm')) {
                errorMessage = 'Пароли не совпадают!';
            } else if (error.message.includes('username')) {
                errorMessage = 'Это имя пользователя уже занято!';
            }

            showMessage('message', errorMessage, 'error');
        }
    });
</script>
{% endblock %}
